# ============================================
# PolyVault 负载均衡部署配置
# 用法: docker-compose -f docker-compose.yml -f docker-compose.lb.yml up -d
# ============================================

version: '3.8'

services:
  # ==================== 负载均衡器 ====================
  nginx-lb:
    image: nginx:alpine
    container_name: polyvault-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./config/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - agent
    networks:
      - polyvault-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ==================== Agent 服务（可扩展）====================
  agent:
    image: polyvault/agent:latest
    # 不再直接暴露端口，通过负载均衡器访问
    expose:
      - "8080"
    environment:
      - DATABASE_URL=sqlite:///data/polyvault.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID={{.Task.Name}}
      - METRICS_ENABLED=true
      - METRICS_PORT=9090
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - polyvault-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      # 默认2个实例，可通过 --scale agent=N 调整
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    stop_grace_period: 30s

  # ==================== Redis（共享会话存储）====================
  redis:
    image: redis:7-alpine
    container_name: polyvault-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - polyvault-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ==================== Agent Worker ====================
  agent-worker:
    image: polyvault/agent:latest
    command: worker
    environment:
      - DATABASE_URL=sqlite:///data/polyvault.db
      - REDIS_URL=redis://redis:6379
      - WORKER_CONCURRENCY=4
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - polyvault-net
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  polyvault-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  redis_data:
  nginx_logs: