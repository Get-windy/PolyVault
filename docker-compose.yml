# PolyVault Docker部署

## 快速启动

```bash
# 克隆项目
git clone https://github.com/polyvault/polyvault.git
cd polyvault

# 复制环境变量
cp .env.example .env

# 启动服务
docker-compose up -d
```

## docker-compose.yml

```yaml
version: '3.8'

services:
  agent:
    image: polyvault/agent:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///data/polyvault.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    restart: unless-stopped

  agent-worker:
    image: polyvault/agent:latest
    command: worker
    environment:
      - DATABASE_URL=sqlite:///data/polyvault.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - redis
    restart: unless-stopped
```

## 环境变量

| 变量 | 说明 | 示例 |
|------|------|------|
| DATABASE_URL | 数据库连接 | sqlite:///data/polyvault.db |
| ENCRYPTION_KEY | 加密密钥 | base64_encoded_32_byte_key |
| REDIS_URL | Redis连接 | redis://redis:6379 |
| LOG_LEVEL | 日志级别 | info, warn, error |

## 备份

```bash
# 备份数据
docker exec polyvault-agent tar czf /backup.tar.gz /app/data

# 恢复数据
docker exec -i polyvault-agent tar xzf /backup.tar.gz -C /app/data
```

## 更新

```bash
# 拉取最新镜像
docker-compose pull

# 重启服务
docker-compose up -d
```

## 日志

```bash
# 查看日志
docker logs -f polyvault-agent

# 查看实时日志
docker-compose logs -f agent
```