syntax = "proto3";

package openclaw;

// ============================================================================
// 基础类型
// ============================================================================

/**
 * 设备类型
 */
enum DeviceType {
    DEVICE_TYPE_UNSPECIFIED = 0;
    DEVICE_TYPE_ANDROID = 1;
    DEVICE_TYPE_IOS = 2;
    DEVICE_TYPE_WINDOWS = 3;
    DEVICE_TYPE_MACOS = 4;
    DEVICE_TYPE_LINUX = 5;
    DEVICE_TYPE_HARMONY = 6;
    DEVICE_TYPE_EMBEDDED = 7;
}

/**
 * 凭证类型
 */
enum CredentialType {
    CREDENTIAL_TYPE_UNSPECIFIED = 0;
    CREDENTIAL_TYPE_PASSWORD = 1;       // 用户名+密码
    CREDENTIAL_TYPE_OAUTH = 2;          // OAuth令牌
    CREDENTIAL_TYPE_API_KEY = 3;        // API密钥
    CREDENTIAL_TYPE_CERTIFICATE = 4;    // 客户端证书
    CREDENTIAL_TYPE_COOKIE = 5;         // Cookie
}

/**
 * 授权状态
 */
enum AuthorizationStatus {
    AUTH_STATUS_UNSPECIFIED = 0;
    AUTH_STATUS_PENDING = 1;            // 等待用户授权
    AUTH_STATUS_APPROVED = 2;           // 用户已批准
    AUTH_STATUS_DENIED = 3;             // 用户已拒绝
    AUTH_STATUS_TIMEOUT = 4;            // 超时
    AUTH_STATUS_CANCELED = 5;           // 已取消
}

// ============================================================================
// 设备管理
// ============================================================================

/**
 * 设备信息
 */
message DeviceInfo {
    string device_id = 1;               // 设备唯一标识
    string device_name = 2;             // 设备名称（用户可自定义）
    DeviceType device_type = 3;         // 设备类型
    string platform_version = 4;        // 平台版本（如 Android 14, iOS 17.2）
    string app_version = 5;             // 客户端版本
    uint64 last_active_time = 6;        // 最后活跃时间（Unix时间戳）
    bool is_online = 7;                 // 是否在线
    repeated string capabilities = 8;   // 设备能力列表
}

/**
 * 设备注册请求
 */
message DeviceRegisterRequest {
    DeviceInfo device = 1;
    bytes public_key = 2;               // 设备公钥（用于加密通信）
    string device_token = 3;            // 推送令牌（可选，用于移动设备）
}

/**
 * 设备注册响应
 */
message DeviceRegisterResponse {
    bool success = 1;
    string error_message = 2;
    string device_id = 3;               // 分配的设备ID
    uint64 registration_time = 4;       // 注册时间
}

/**
 * 设备心跳
 */
message DeviceHeartbeat {
    string device_id = 1;
    uint64 timestamp = 2;
    map<string, string> status = 3;     // 状态信息（如电量、网络状态）
}

/**
 * 设备列表请求
 */
message DeviceListRequest {
    string user_id = 1;                 // 用户ID（可选，用于跨设备查询）
}

/**
 * 设备列表响应
 */
message DeviceListResponse {
    repeated DeviceInfo devices = 1;
}

// ============================================================================
// 凭证请求/响应
// ============================================================================

/**
 * 凭证请求
 */
message CredentialRequest {
    string request_id = 1;              // 请求唯一标识（UUID）
    string service_url = 2;             // 服务URL（如 https://accounts.google.com）
    string service_name = 3;            // 服务名称（如 Google, GitHub）
    CredentialType credential_type = 4; // 需要的凭证类型
    uint64 timestamp = 5;               // 请求时间戳
    uint32 timeout_seconds = 6;         // 超时时间（秒）
    string reason = 7;                  // 请求原因（用于向用户展示）
    map<string, string> context = 8;    // 额外上下文信息
}

/**
 * 凭证响应
 */
message CredentialResponse {
    string request_id = 1;              // 对应的请求ID
    AuthorizationStatus status = 2;     // 授权状态
    bytes encrypted_credential = 3;     // 加密的凭证（使用设备公钥加密）
    string error_message = 4;           // 错误信息
    uint64 timestamp = 5;               // 响应时间戳
}

/**
 * 凭证存储请求
 */
message CredentialStoreRequest {
    string service_url = 1;
    CredentialType credential_type = 2;
    bytes encrypted_credential = 3;     // 加密的凭证
    map<string, string> metadata = 4;   // 元数据（如用户名提示）
}

/**
 * 凭证存储响应
 */
message CredentialStoreResponse {
    bool success = 1;
    string error_message = 2;
    string credential_id = 3;           // 凭证ID
}

/**
 * 凭证删除请求
 */
message CredentialDeleteRequest {
    string service_url = 1;
    string credential_id = 2;           // 可选，删除特定凭证
}

/**
 * 凭证删除响应
 */
message CredentialDeleteResponse {
    bool success = 1;
    string error_message = 2;
}

// ============================================================================
// Cookie管理
// ============================================================================

/**
 * Cookie项
 */
message CookieItem {
    string name = 1;
    string value = 2;
    string domain = 3;
    string path = 4;
    uint64 expires = 5;                 // 过期时间（Unix时间戳）
    bool secure = 6;
    bool http_only = 7;
    string same_site = 8;               // Strict, Lax, None
}

/**
 * Cookie上传请求
 */
message CookieUploadRequest {
    string request_id = 1;
    string service_url = 2;
    repeated CookieItem cookies = 3;
    bytes encrypted_cookies = 4;        // 可选：整体加密的Cookie数据
}

/**
 * Cookie上传响应
 */
message CookieUploadResponse {
    bool success = 1;
    string error_message = 2;
}

/**
 * Cookie下载请求
 */
message CookieDownloadRequest {
    string service_url = 1;
    string device_id = 2;               // 从哪个设备获取
}

/**
 * Cookie下载响应
 */
message CookieDownloadResponse {
    bool success = 1;
    string error_message = 2;
    repeated CookieItem cookies = 3;
    bytes encrypted_cookies = 4;
}

// ============================================================================
// 设备能力（能力虚拟化）
// ============================================================================

/**
 * 能力类型
 */
enum CapabilityType {
    CAPABILITY_UNSPECIFIED = 0;
    CAPABILITY_CREDENTIAL_PROVIDER = 1;     // 凭证提供者
    CAPABILITY_COOKIE_STORAGE = 2;          // Cookie存储
    CAPABILITY_BIOMETRIC_AUTH = 3;          // 生物认证
    CAPABILITY_SECURE_DISPLAY = 4;          // 安全显示（TEE）
    CAPABILITY_SENSOR_DATA = 5;             // 传感器数据
    CAPABILITY_LOCATION = 6;                // 位置服务
}

/**
 * 能力声明
 */
message Capability {
    string device_id = 1;
    CapabilityType type = 2;
    string name = 3;
    string description = 4;
    map<string, string> properties = 5;     // 能力属性
    bool is_available = 6;                  // 当前是否可用
}

/**
 * 能力发现请求
 */
message CapabilityDiscoveryRequest {
    string device_id = 1;                   // 可选，查询特定设备
    CapabilityType type_filter = 2;         // 可选，按类型过滤
}

/**
 * 能力发现响应
 */
message CapabilityDiscoveryResponse {
    repeated Capability capabilities = 1;
}

// ============================================================================
 // 授权流程
// ============================================================================

/**
 * 授权请求
 */
message AuthorizationRequest {
    string auth_id = 1;                     // 授权会话ID
    CredentialRequest credential_request = 2;
    DeviceInfo requesting_device = 3;       // 请求设备信息
    uint64 created_time = 4;
    uint64 expires_time = 5;
}

/**
 * 授权响应
 */
message AuthorizationResponse {
    string auth_id = 1;
    AuthorizationStatus status = 2;
    string device_id = 3;                   // 授权设备ID
    CredentialResponse credential_response = 4;
}

/**
 * 授权取消请求
 */
message AuthorizationCancelRequest {
    string auth_id = 1;
    string reason = 2;
}

/**
 * 授权取消响应
 */
message AuthorizationCancelResponse {
    bool success = 1;
    string error_message = 2;
}

// ============================================================================
// 同步与备份
// ============================================================================

/**
 * 同步请求
 */
message SyncRequest {
    string device_id = 1;
    uint64 last_sync_time = 2;              // 上次同步时间
    repeated string service_urls = 3;       // 需要同步的服务（空=全部）
}

/**
 * 同步数据
 */
message SyncData {
    string service_url = 1;
    bytes encrypted_data = 2;               // 加密的同步数据
    uint64 modified_time = 3;
    string checksum = 4;                    // 数据校验
}

/**
 * 同步响应
 */
message SyncResponse {
    bool success = 1;
    string error_message = 2;
    repeated SyncData data = 3;
    uint64 sync_time = 4;
}

// ============================================================================
// 服务定义
// ============================================================================

/**
 * 凭证服务 - 客户端提供
 */
service CredentialService {
    // 获取凭证
    rpc GetCredential(CredentialRequest) returns (CredentialResponse);
    
    // 存储凭证
    rpc StoreCredential(CredentialStoreRequest) returns (CredentialStoreResponse);
    
    // 删除凭证
    rpc DeleteCredential(CredentialDeleteRequest) returns (CredentialDeleteResponse);
    
    // Cookie上传
    rpc UploadCookie(CookieUploadRequest) returns (CookieUploadResponse);
    
    // Cookie下载
    rpc DownloadCookie(CookieDownloadRequest) returns (CookieDownloadResponse);
}

/**
 * 设备服务 - 管理服务
 */
service DeviceService {
    // 设备注册
    rpc RegisterDevice(DeviceRegisterRequest) returns (DeviceRegisterResponse);
    
    // 设备心跳
    rpc Heartbeat(DeviceHeartbeat) returns (google.protobuf.Empty);
    
    // 获取设备列表
    rpc ListDevices(DeviceListRequest) returns (DeviceListResponse);
    
    // 能力发现
    rpc DiscoverCapabilities(CapabilityDiscoveryRequest) returns (CapabilityDiscoveryResponse);
}

/**
 * 授权服务 - Agent提供
 */
service AuthorizationService {
    // 请求授权
    rpc RequestAuthorization(AuthorizationRequest) returns (AuthorizationResponse);
    
    // 取消授权
    rpc CancelAuthorization(AuthorizationCancelRequest) returns (AuthorizationCancelResponse);
}

/**
 * 同步服务
 */
service SyncService {
    // 同步数据
    rpc Sync(SyncRequest) returns (SyncResponse);
}

// ============================================================================
// 安全与加密
// ============================================================================

/**
 * 加密算法类型
 */
enum EncryptionAlgorithm {
    ENCRYPTION_UNSPECIFIED = 0;
    ENCRYPTION_AES_256_GCM = 1;         // AES-256-GCM
    ENCRYPTION_CHACHA20_POLY1305 = 2;   // ChaCha20-Poly1305
    ENCRYPTION_RSA_OAEP = 3;            // RSA-OAEP (用于密钥交换)
}

/**
 * 密钥交换请求
 */
message KeyExchangeRequest {
    string device_id = 1;
    bytes public_key = 2;               // ECDH公钥
    EncryptionAlgorithm preferred_algorithm = 3;
    uint64 timestamp = 4;
}

/**
 * 密钥交换响应
 */
message KeyExchangeResponse {
    bool success = 1;
    bytes public_key = 2;               // 服务端ECDH公钥
    bytes encrypted_session_key = 3;    // 加密的会话密钥
    EncryptionAlgorithm algorithm = 4;
    uint64 expires_time = 5;            // 会话过期时间
}

/**
 * 安全级别
 */
enum SecurityLevel {
    SECURITY_LEVEL_UNSPECIFIED = 0;
    SECURITY_LEVEL_SOFTWARE = 1;        // 软件加密
    SECURITY_LEVEL_HARDWARE = 2;        // 硬件安全模块
    SECURITY_LEVEL_TEE = 3;             // 可信执行环境
    SECURITY_LEVEL_SECURE_ELEMENT = 4;  // 安全芯片
}

/**
 * 安全状态报告
 */
message SecurityStatus {
    string device_id = 1;
    SecurityLevel level = 2;
    bool biometric_available = 3;       // 生物认证是否可用
    bool secure_display = 4;            // 安全显示是否可用
    string security_chip = 5;           // 安全芯片型号（如有）
    map<string, string> details = 6;    // 详细信息
}

/**
 * 生物认证请求
 */
message BiometricAuthRequest {
    string request_id = 1;
    string reason = 2;                  // 认证原因（显示给用户）
    uint32 timeout_seconds = 3;
}

/**
 * 生物认证响应
 */
message BiometricAuthResponse {
    string request_id = 1;
    bool success = 2;
    string error_message = 3;
    uint64 timestamp = 4;
}

// ============================================================================
// Native Messaging (浏览器扩展 <-> Agent)
// ============================================================================

/**
 * Native Messaging消息类型
 */
enum NativeMessageType {
    NATIVE_MSG_UNSPECIFIED = 0;
    NATIVE_MSG_CREDENTIAL_REQUEST = 1;      // 请求凭证
    NATIVE_MSG_CREDENTIAL_RESPONSE = 2;     // 凭证响应
    NATIVE_MSG_COOKIE_STORE = 3;            // 存储Cookie
    NATIVE_MSG_COOKIE_RETRIEVE = 4;         // 获取Cookie
    NATIVE_MSG_STATUS = 5;                  // 状态查询
    NATIVE_MSG_ERROR = 6;                   // 错误
    NATIVE_MSG_PING = 7;                    // 心跳
    NATIVE_MSG_PONG = 8;                    // 心跳响应
}

/**
 * Native Messaging请求
 */
message NativeMessageRequest {
    NativeMessageType type = 1;
    string request_id = 2;
    uint32 tab_id = 3;                      // 浏览器标签页ID
    string url = 4;                         // 当前页面URL
    map<string, string> data = 5;           // 请求数据
    uint64 timestamp = 6;
}

/**
 * Native Messaging响应
 */
message NativeMessageResponse {
    NativeMessageType type = 1;
    string request_id = 2;
    bool success = 3;
    map<string, string> data = 4;           // 响应数据
    string error_message = 5;
    uint64 timestamp = 6;
}

// ============================================================================
// 自动授权规则
// ============================================================================

/**
 * 自动授权规则
 */
message AutoAuthRule {
    string rule_id = 1;
    string service_url_pattern = 2;         // URL匹配模式（支持通配符）
    bool auto_approve = 3;                  // 是否自动批准
    uint32 max_auto_approvals = 4;          // 最大自动批准次数（0=无限）
    uint32 auto_approvals_used = 5;         // 已使用次数
    uint64 created_time = 6;
    uint64 expires_time = 7;                // 规则过期时间（0=永不过期）
    bool require_biometric = 8;             // 是否需要生物认证
    map<string, string> conditions = 9;     // 附加条件
}

/**
 * 规则添加请求
 */
message AddAutoAuthRuleRequest {
    AutoAuthRule rule = 1;
}

/**
 * 规则添加响应
 */
message AddAutoAuthRuleResponse {
    bool success = 1;
    string error_message = 2;
    string rule_id = 3;
}

/**
 * 规则删除请求
 */
message RemoveAutoAuthRuleRequest {
    string rule_id = 1;
}

/**
 * 规则删除响应
 */
message RemoveAutoAuthRuleResponse {
    bool success = 1;
    string error_message = 2;
}

/**
 * 规则列表请求
 */
message ListAutoAuthRulesRequest {
    string service_url = 1;                 // 可选，筛选特定服务
}

/**
 * 规则列表响应
 */
message ListAutoAuthRulesResponse {
    repeated AutoAuthRule rules = 1;
}

// ============================================================================
// 事件与通知
// ============================================================================

/**
 * 事件类型
 */
enum EventType {
    EVENT_UNSPECIFIED = 0;
    EVENT_DEVICE_CONNECTED = 1;            // 设备连接
    EVENT_DEVICE_DISCONNECTED = 2;         // 设备断开
    EVENT_CREDENTIAL_REQUESTED = 3;         // 凭证请求
    EVENT_CREDENTIAL_GRANTED = 4;           // 凭证授权
    EVENT_CREDENTIAL_DENIED = 5;            // 凭证拒绝
    EVENT_SECURITY_ALERT = 6;               // 安全告警
    EVENT_SYNC_COMPLETED = 7;               // 同步完成
    EVENT_SYNC_FAILED = 8;                  // 同步失败
}

/**
 * 事件消息
 */
message Event {
    string event_id = 1;
    EventType type = 2;
    string device_id = 3;                   // 来源设备
    uint64 timestamp = 4;
    map<string, string> data = 5;           // 事件数据
    string message = 6;                     // 人类可读消息
}

/**
 * 事件订阅请求
 */
message SubscribeEventsRequest {
    repeated EventType event_types = 1;     // 订阅的事件类型
    string subscriber_id = 2;
}

/**
 * 事件订阅响应
 */
message SubscribeEventsResponse {
    bool success = 1;
    string error_message = 2;
    string subscription_id = 3;
}

// ============================================================================
// 服务定义扩展
// ============================================================================

/**
 * 安全服务 - 客户端提供
 */
service SecurityService {
    // 密钥交换
    rpc KeyExchange(KeyExchangeRequest) returns (KeyExchangeResponse);
    
    // 获取安全状态
    rpc GetSecurityStatus(google.protobuf.Empty) returns (SecurityStatus);
    
    // 生物认证
    rpc BiometricAuth(BiometricAuthRequest) returns (BiometricAuthResponse);
}

/**
 * Native Messaging服务 - Agent提供
 */
service NativeMessagingService {
    // 处理请求
    rpc HandleMessage(NativeMessageRequest) returns (NativeMessageResponse);
    
    // 心跳
    rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
}

/**
 * 自动授权规则服务
 */
service AutoAuthRuleService {
    // 添加规则
    rpc AddRule(AddAutoAuthRuleRequest) returns (AddAutoAuthRuleResponse);
    
    // 删除规则
    rpc RemoveRule(RemoveAutoAuthRuleRequest) returns (RemoveAutoAuthRuleResponse);
    
    // 列出规则
    rpc ListRules(ListAutoAuthRulesRequest) returns (ListAutoAuthRulesResponse);
}

/**
 * 事件服务
 */
service EventService {
    // 订阅事件
    rpc Subscribe(SubscribeEventsRequest) returns (SubscribeEventsResponse);
    
    // 推送事件（服务端流式）
    rpc StreamEvents(SubscribeEventsRequest) returns (stream Event);
}

// ============================================================================
// 导入Google Protobuf
// ============================================================================

import "google/protobuf/empty.proto";