# PolyVault 多实例负载均衡配置
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'backend=$upstream_addr rt=$upstream_response_time '
                    'instance=$upstream_http_x_instance_id';

    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":"$status",'
        '"request_time":"$request_time",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"instance_id":"$upstream_http_x_instance_id"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain application/json application/javascript;

    # 速率限制
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ==================== 上游集群 ====================
    upstream polyvault_cluster {
        # 最少连接算法
        least_conn;
        
        # 多实例配置
        server agent-1:8080 weight=5 max_fails=3 fail_timeout=30s;
        server agent-2:8080 weight=5 max_fails=3 fail_timeout=30s;
        server agent-3:8080 weight=5 max_fails=3 fail_timeout=30s;
        
        # 保持连接池
        keepalive 64;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    # WebSocket专用（IP哈希保证会话一致性）
    upstream polyvault_ws {
        ip_hash;
        server agent-1:8080 max_fails=3 fail_timeout=30s;
        server agent-2:8080 max_fails=3 fail_timeout=30s;
        server agent-3:8080 max_fails=3 fail_timeout=30s;
    }

    # 缓存区域
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:50m max_size=500m inactive=10m;

    # 加载站点配置
    include /etc/nginx/conf.d/*.conf;
}