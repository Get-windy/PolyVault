# PolyVault 监控配置
# Prometheus + Grafana + AlertManager

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'polyvault-monitor'

# 告警规则文件
rule_files:
  - 'alerts/*.yml'

# Alertmanager配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

# 抓取配置
scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # PolyVault Agent监控
  - job_name: 'polyvault-agent'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'agent'
          environment: 'production'
    metrics_path: '/metrics'

  # Node Exporter (系统指标)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'polyvault-server'

  # MySQL Exporter
  - job_name: 'mysql-exporter'
    static_configs:
      - targets: ['localhost:9104']
        labels:
          service: 'mysql'

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['localhost:9121']
        labels:
          service: 'redis'

  # eCAL监控
  - job_name: 'ecal-monitor'
    static_configs:
      - targets: ['localhost:14000']
        labels:
          service: 'ecal'