# PolyVault Agent配置文件

# ==================== 服务配置 ====================
server:
  # REST API端口
  rest_port: 8080
  # 指标端口
  metrics_port: 9090
  # 最大连接数
  max_connections: 100
  # 请求超时（秒）
  request_timeout: 30

# ==================== 日志配置 ====================
logging:
  # 日志级别: trace, debug, info, warn, error
  level: info
  # 日志目录
  dir: /app/logs
  # 日志文件前缀
  prefix: polyvault
  # 最大日志文件大小（MB）
  max_size: 10
  # 最大日志文件数量
  max_files: 5
  # 是否输出到控制台
  console: true

# ==================== 数据配置 ====================
data:
  # 数据目录
  dir: /app/data
  # 自动保存间隔（秒）
  auto_save_interval: 60
  # 最大凭证数量
  max_credentials: 1000

# ==================== 安全配置 ====================
security:
  # 主密钥长度
  key_length: 32
  # 凭证加密算法
  encryption: AES-256-GCM
  # 密钥派生迭代次数
  kdf_iterations: 100000
  # 会话超时（秒）
  session_timeout: 3600
  # 最大登录尝试次数
  max_login_attempts: 5
  # 锁定时间（秒）
  lockout_duration: 300

# ==================== 存储配置 ====================
storage:
  # 存储类型: file, redis
  type: file
  # 文件存储路径
  file_path: /app/data/vault.dat
  # Redis配置（当type=redis时）
  redis:
    host: redis
    port: 6379
    db: 0
    # password: ""

# ==================== 审计配置 ====================
audit:
  # 是否启用审计
  enabled: true
  # 审计日志文件
  log_file: /app/logs/audit.log
  # 审计事件: credential_access, credential_create, credential_delete, auth_success, auth_failure
  events:
    - credential_access
    - credential_create
    - credential_delete
    - auth_success
    - auth_failure

# ==================== 性能配置 ====================
performance:
  # 工作线程数
  worker_threads: 4
  # 连接池大小
  connection_pool: 20
  # 缓存大小（MB）
  cache_size: 100

# ==================== 开发配置 ====================
development:
  # 开发模式
  dev_mode: false
  # 调试端口
  debug_port: 9999
  # 是否启用profiling
  profiling: false