name: polyvault
version: 0.1.0+1
publish_to: none
description: PolyVault - Secure credential storage with zk_vault

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 安全存储核心
  zk_vault: ^0.1.3
  
  # 状态管理
  flutter_riverpod: ^2.4.0
  
  # 路由导航
  go_router: ^12.0.0
  
  # 本地存储配置
  shared_preferences: ^2.2.0
  
  # UI组件
  flutter_screenutil: ^5.9.0
  cupertino_icons: ^1.0.6
  
  # HTTP 客户端
  http: ^1.1.0
  
  # 路由导航
  go_router: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
