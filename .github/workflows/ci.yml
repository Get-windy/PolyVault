name: PolyVault CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== 代码检查 ====================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python linters
        run: pip install flake8 black isort
      
      - name: Run flake8
        run: flake8 tests/ --max-line-length=100 --ignore=E501,W503,F401 || true
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          cache: true
      
      - name: Flutter analyze
        run: |
          cd src/client
          flutter pub get || true
          flutter analyze || true

  # ==================== 单元测试 ====================
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-asyncio
      
      - name: Run Python tests
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=html \
            -v \
            --ignore=tests/performance || true
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          cache: true
      
      - name: Run Flutter tests
        run: |
          cd src/client
          flutter pub get || true
          flutter test --coverage || true
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            src/client/coverage/

  # ==================== C++ 构建 ====================
  build-cpp:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22'
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build libssl-dev
      
      - name: Configure CMake
        run: |
          cd src/agent
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SIMPLE=ON \
            -DBUILD_TESTS=ON \
            -G Ninja
      
      - name: Build
        run: |
          cd src/agent
          cmake --build build --parallel $(nproc)
      
      - name: Run C++ tests
        run: |
          cd src/agent/build
          ctest --output-on-failure || true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-build
          path: src/agent/build/polyvault_agent_simple
          retention-days: 7

  # ==================== Docker 构建 ====================
  build-docker:
    runs-on: ubuntu-latest
    needs: [test, build-cpp]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ==================== 安全扫描 ====================
  security:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ==================== 部署 Staging ====================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-docker, security]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.polyvault.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-docker.outputs.image-tag }}"
          # 实际部署通过 SSH 或 Kubernetes API

  # ==================== 部署 Production ====================
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-docker, security]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://polyvault.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Version: ${{ needs.build-docker.outputs.image-tag }}"
          # 实际部署通过 SSH 或 Kubernetes API
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            src/agent/build/polyvault_agent_simple